spring.application.name=hexagonal-practice
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=io.github.eschoe.hexagonal

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Hexagonal architecture practice
info.app.version=0.0.1-SNAPSHOT

app.order.max-items-per-order=50
app.shipping.default-carrier=HEX-LOGISTICS

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
